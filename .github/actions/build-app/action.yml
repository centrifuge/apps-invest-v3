name: 'Build App GH action'
description: 'Build app with common setup'

inputs:
  build-args:
    description: 'pnpm $build-args'
    required: false

  github-token:
    description: 'GitHub token (required for mainnet builds)'
    required: false

runs:
  using: 'composite'
  steps:
    - name: '🟢 Setup Node.js'
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: '📦 Enable Corepack'
      shell: sh
      run: corepack enable

    - name: '🔍 Check if Build Artifact Already Exists'
      if: github.event_name == 'release'
      id: check-artifact
      shell: sh
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        GH_REF_NAME: ${{ github.ref_name }}
        GH_REPOSITORY: ${{ github.repository }}
      run: |
        ARTIFACT_NAME="invest-bundle${GH_REF_NAME}.zip"
        echo "artifact-name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
        if [ -n "$(gh release view "$GH_REF_NAME" --repo "$GH_REPOSITORY" --json assets --jq '.assets[] | select(.name == "'"$ARTIFACT_NAME"'")')" ]; then
          echo "::info::✅ Build artifact already exists, skipping build: $ARTIFACT_NAME"
          echo "skip_build=true" >> $GITHUB_OUTPUT
        else
          echo "::info::🔄 Build artifact not found, building $ARTIFACT_NAME"
          echo "skip_build=false" >> $GITHUB_OUTPUT
        fi

    - name: '📥 Install Dependencies'
      shell: sh
      run: pnpm install --frozen-lockfile

    - name: '🎨 Generate Chakra UI Types'
      if: ${{ github.event_name != 'release' || steps.check-artifact.outputs.skip_build != 'true' }}
      shell: sh
      run: pnpm theme:typings

    - name: '🔨 Build App'
      if: ${{ github.event_name != 'release' || steps.check-artifact.outputs.skip_build != 'true' }}
      id: build
      shell: sh
      run: |
        pnpm build $BUILD_ARGS
      env:
        BUILD_ARGS: ${{ inputs.build-args }}

    - name: '📦 Upload Build Artifact'
      if: ${{ steps.build.outcome == 'success' }}
      uses: actions/upload-artifact@v4
      with:
        name: invest-v3-build-${{ github.sha }}
        path: ./dist

    - name: '📦 Upload Build Artifact to Release'
      if: ${{ steps.build.outcome == 'success' &&  github.event.action == 'prereleased' }}
      shell: sh
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        GH_REF_NAME: ${{ github.ref_name }}
        GH_REPOSITORY: ${{ github.repository }}
        ARTIFACT_NAME: ${{ steps.check-artifact.outputs.artifact-name }}
      run: |
        # Create a zip file of the dist folder
        cd dist && zip -r "../$ARTIFACT_NAME" . && cd ..

        # Upload to release using GitHub CLI
        gh release upload "$GH_REF_NAME" "$ARTIFACT_NAME" \
          --repo "$GH_REPOSITORY" \
          --clobber
