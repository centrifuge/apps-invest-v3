name: '🔍 CI Checks'

on:
  pull_request:

jobs:
  basic-checks:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: '📥 Checkout Code'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'

      - name: '📦 Enable Corepack'
        shell: sh
        run: corepack enable

      - name: Install dependencies
        shell: sh
        run: pnpm install --frozen-lockfile

      - name: Check code formatting
        shell: sh
        run: pnpm dlx prettier@3.6.2 --check "**/*.{ts,tsx,js,jsx,json,md}"

      - name: Lint
        if: always()
        shell: sh
        run: pnpm run lint

      - name: Run codespell
        uses: codespell-project/actions-codespell@406322ec52dd7b488e48c1c4b82e2a8b3a1bf630 # v2
        with:
          path: src
          skip: src/assets/**,src/ui/assets/**,.svg,.png,.jpg,.jpeg,.ico
          exclude_file: src/ui/assets/logos/moody.svg
          ignore_words_list: amountIn

      - name: Audit dependencies with pnpm
        if: always()
        shell: sh
        # pnpm <11 hits HTTP 410 from the retired npm audit endpoint.
        # Use pnpm v11 rc via dlx for the fixed bulk advisory API.
        # Revert to plain `pnpm audit` once project upgrades to pnpm >=11.
        # See: https://github.com/pnpm/pnpm/issues/11265
        run: pnpm --config.minimumReleaseAge=0 dlx pnpm@11.0.0-rc.1 --config.manage-package-manager-versions=false audit --audit-level moderate

  osv-dependency-sec-check:
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: 'google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@90b209d0ea55cea1da9fc0c4e65782cc6acb6e2e' # v2.2.2
    with:
      fail-on-vuln: true
      upload-sarif: true

  secrets-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: $((${{ github.event.pull_request.commits }}+2))
          # Shallow clone to speed up the action
      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@0c9fbff42893900f6cc15010c408d70d6013819c # v3.90.4
        with:
          extra_args: --exclude-globs "**/dist/**,**/build/**,.github/**"
        # continue-on-error: true
